name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven

      - name: Build and test
        run: mvn -B install

      - name: Upload viewer jar
        uses: actions/upload-artifact@v5
        with:
          name: searobots-viewer
          path: searobots-viewer/target/searobots-viewer-*.jar
          retention-days: 30
